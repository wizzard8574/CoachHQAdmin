<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CoachHQ Admin</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div><h1>CoachHQ</h1><small>Admin Portal</small></div><div><span id="user"></span><button id="login">Sign in</button><button id="logout" hidden>Sign out</button></div></header>
<main>
<section id="signedOut" class="card hero"><h2>CoachHQ Data Portal</h2><p>Sign in to browse organizations, teams, and app data.</p><button id="heroLogin">Sign in</button></section>
<section id="app" hidden>
<div class="card controls">
<label>Organization<select id="org"><option value="">Select an organization</option></select></label>
<label>Team<select id="team" disabled><option value="">Select a team</option></select></label>
<label>Record type<select id="type" disabled><option value="">All records</option><option>PLAYER</option><option>DECISION</option><option>EVALUATION</option><option>SESSION</option><option>GAME</option><option>LINEUP</option><option>ATBAT</option><option>PITCH</option><option>CALL</option><option>PLAY</option><option>APP_DATA</option></select></label>
<label>Search<input id="search" placeholder="Search records" disabled></label>
<button id="refresh" disabled>Refresh</button><button id="csv" disabled>Export CSV</button>
</div>
<div class="stats"><div class="card"><span>Organizations</span><strong id="orgCount">0</strong></div><div class="card"><span>Teams</span><strong id="teamCount">0</strong></div><div class="card"><span>Records</span><strong id="recordCount">0</strong></div></div>
<section class="card"><h2>Records</h2><p id="status">Choose an organization and team.</p><div id="error" hidden></div><div class="table"><table><thead><tr><th>Type</th><th>Name / ID</th><th>Details</th><th>Updated</th><th></th></tr></thead><tbody id="rows"><tr><td colspan="5">No records loaded.</td></tr></tbody></table></div></section>
</section></main>
<dialog id="dialog"><button id="close">Close</button><pre id="json"></pre></dialog>
<script src="config.js"></script><script src="app.js"></script></body></html>
